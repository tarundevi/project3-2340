services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/data/chromadb
      - CORS_ALLOWED_ORIGINS=http://localhost
    volumes:
      - ./backend/data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
